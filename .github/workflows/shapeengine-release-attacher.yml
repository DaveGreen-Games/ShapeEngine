name: Build/Attach Examples & ResourcePacker Artifacts to ShapeEngine Releases

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    env:
      dotnet-version: "10.0.x"
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            runtime: win-x64
          - os: ubuntu-latest
            runtime: linux-x64
          - os: macos-latest
            runtime: osx-arm64
          - os: macos-15-intel
            runtime: osx-x64

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.runtime }})
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.dotnet-version }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Publish Examples
        run: >
          dotnet publish ./Examples/Examples.csproj
          -c Release
          -r ${{ matrix.runtime }}
          --self-contained true
          -o ./publish/Examples/${{ matrix.runtime }}

      - name: Verify Examples publish output
        shell: bash
        run: |
          test -d ./publish/Examples/${{ matrix.runtime }}
          find ./publish/Examples/${{ matrix.runtime }} -type f | head

      - name: Publish ResourcePacker
        run: >
          dotnet publish ./ResourcePacker/ResourcePacker.csproj
          -c Release
          -r ${{ matrix.runtime }}
          --self-contained true
          -o ./publish/ResourcePacker/${{ matrix.runtime }}

      - name: Verify ResourcePacker publish output
        shell: bash
        run: |
          test -d ./publish/ResourcePacker/${{ matrix.runtime }}
          find ./publish/ResourcePacker/${{ matrix.runtime }} -type f | head

      - name: Upload Examples Artifact
        uses: actions/upload-artifact@v4.5.0
        with:
          name: ${{ matrix.runtime }}-Examples
          path: ./publish/Examples/${{ matrix.runtime }}

      - name: Upload ResourcePacker Artifact
        uses: actions/upload-artifact@v4.5.0
        with:
          name: ${{ matrix.runtime }}-ResourcePacker
          path: ./publish/ResourcePacker/${{ matrix.runtime }}

  attach:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Examples artifacts
        uses: actions/download-artifact@v4.3.0
        with:
          pattern: "*-Examples"
          merge-multiple: false
          path: ./artifacts

      - name: Download ResourcePacker artifacts
        uses: actions/download-artifact@v4.3.0
        with:
          pattern: "*-ResourcePacker"
          merge-multiple: false
          path: ./artifacts

      - name: Verify downloaded artifacts
        shell: bash
        run: |
          if [ ! -d "./artifacts" ] || [ -z "$(find ./artifacts -type f 2>/dev/null)" ]; then
            echo "No artifacts were downloaded."
            echo "Expected build artifacts from the matrix jobs, but none were found."
            exit 1
          fi

          ls -R ./artifacts

      - name: Upload artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean up artifacts
        run: rm -rf ./artifacts
